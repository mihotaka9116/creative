<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - Miho Takahashi</title>
  <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"> 
  <style>
    /* カートページ専用スタイル */
    .cart-container { max-width: 800px; margin: 100px auto; padding: 0 20px; }
    .cart-item { display: flex; align-items: center; padding: 20px 0; border-bottom: 1px solid #eee; gap: 20px; }
    .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; background: #f9f9f9; }
    .cart-item-info { flex-grow: 1; }
    .cart-total { text-align: right; font-size: 1.5rem; margin-top: 30px; font-weight: bold; }
    .empty-msg { text-align: center; margin-top: 50px; color: #888; }
    .clear-cart { background: #eee; color: #333; padding: 10px 20px; border: none; cursor: pointer; margin-top: 20px; border-radius: 5px; }
    .back-link { display: inline-block; margin-top: 40px; color: #000; text-decoration: underline; }
    .remove-btn { color: #e2393c; font-size: 0.8rem; border: 1px solid #e2393c; padding: 4px 8px; border-radius: 4px; background: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="cart-container">
    <h1 class="section-title">Shopping Cart</h1>
    
    <div id="cart-items-list">
      </div>

    <div id="cart-summary" style="display:none;">
      <div class="cart-total">合計金額: <span id="total-price">¥0</span></div>
      <div style="text-align: right;">
        <button class="clear-cart" id="js-clear-cart">カートを空にする</button>
        <button class="custom-btn" style="margin-top:20px; width: 100%; cursor: pointer;">購入手続きへ（デモ）</button>
      </div>
    </div>

    <a href="index.html" class="back-link">← ショップに戻る</a>
  </div>

  <script>
    // 保存名を統一
    const STORAGE_KEY = 'miho_cart_data';

    document.addEventListener('DOMContentLoaded', () => {
      renderCart();

      // カートを空にする機能
      document.getElementById('js-clear-cart').addEventListener('click', () => {
        if(confirm('カートを空にしますか？')) {
          localStorage.removeItem(STORAGE_KEY);
          renderCart();
        }
      });
    });

    // カートを描画する関数
    function renderCart() {
      const listContainer = document.getElementById('cart-items-list');
      const summary = document.getElementById('cart-summary');
      const totalPriceElement = document.getElementById('total-price');

      // ローカルストレージから取得
      let cart = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

      if (cart.length === 0) {
        listContainer.innerHTML = '<p class="empty-msg">カートは空です。</p>';
        summary.style.display = 'none';
      } else {
        listContainer.innerHTML = ''; // 一旦クリア
        summary.style.display = 'block';
        let total = 0;

        cart.forEach((item, index) => {
          const itemDiv = document.createElement('div');
          itemDiv.className = 'cart-item';
          
          // 画像がない場合のフォールバック
          const imgSrc = item.image ? item.image : 'placeholder.png';

          itemDiv.innerHTML = `
            <img src="${imgSrc}" alt="${item.name}">
            <div class="cart-item-info">
              <p style="font-weight:bold;">${item.name}</p>
              <p style="color:#666;">¥${Number(item.price).toLocaleString()}</p>
            </div>
            <button onclick="removeItem(${index})" class="remove-btn">削除</button>
          `;
          listContainer.appendChild(itemDiv);
          total += Number(item.price);
        });

        totalPriceElement.textContent = `¥${total.toLocaleString()}`;
      }
    }

    // 特定のアイテムを削除する関数
    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      cart.splice(index, 1);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
      renderCart();
    }
  </script>
</body>
</html>
